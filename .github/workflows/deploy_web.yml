name: Deploy Web (Firebase Hosting)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Web
        run: flutter build web --release

      - name: Generate version.json
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          BUILD_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SHA="${{ github.sha }}"
          cat > build/web/version.json << EOF
          {
            "webLatestVersion": "$VERSION",
            "configVersion": "$SHA",
            "buildAt": "$BUILD_AT",
            "releaseNotes": "Mise à jour Web automatique"
          }
          EOF

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "${{ runner.temp }}/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="${{ runner.temp }}/firebase-sa.json"
          firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID" --non-interactive
